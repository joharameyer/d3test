<!DOCTYPE html>
<html>
<head>
  <title>D3 Example</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.3.0/d3.min.js"></script>
  <style>
    body {
        font-family: "Helvetica Neue", "Helvetica", "Arial", sans-serif;
        font-size: 15pt;
    }
    h1 {
        text-align: center;
        font-weight: 500;
    }
    svg {
        display: block;
        margin: auto;
    }

    /* Tooltip */
    div.tooltip {
        position: absolute;
        visibility: hidden;
        font-size: 60%;
        color: #333333;
        background-color: #e6e6e6;
        opacity: .95;
        padding: 5px;
    }
  </style>
</head>
<body>
    <h1>Poverty Rates in the United States (2014)</h1>
    <div id="map"></div>
    <div class="tooltip"></div>
    <script>
    var data_map = d3.map();

    d3.queue()
        .defer(d3.json, "data/gz_2010_us_050_00_5m.json")
        .defer(d3.csv, "data/PovertyEstimates.csv", function(d){
            // Convert to number
            d['PCTPOVALL_2014'] = +d['PCTPOVALL_2014'];

            // Use the county's FIPS countyode to access that county's data
            return data_map.set(d['FIPStxt'], d);
        })
        .await(function(error, map_json, data_csv) {
            // How does the data look like?
            // console.log(data_csv);

            // Unpack the GeoJSON features
            var counties = map_json['features'];

            //----------------------------------------
            // SVG setup
            var width = 1200,
                height = 600;

            var svg = d3.select('#map').append('svg')
                .attr('width', width)
                .attr('height', height);

            //----------------------------------------
            // Geography setup
            var proj = d3.geoAlbersUsa()
                        .scale(1300)
                        .translate([width/2, height/2]);
            var path_gen = d3.geoPath(proj);

            //----------------------------------------
            // Scale setup
            var colors = ['#f7fbff','#deebf7','#c6dbef','#9ecae1',
                            '#6baed6','#4292c6','#2171b5','#084594'];
            var all_values = data_map.values().map( function(d){
                return d['PCTPOVALL_2014'];
            });

            // Quantile scale
            var color_scale = d3.scaleQuantile()
                                .domain(all_values)
                                .range(colors);

            // Linear scale
            // var max = d3.max(all_values),
            //     min = d3.min(all_values);
            // var color_scale = d3.scaleLinear()
            //                     .domain([min, max])
            //                     .range([colors[0], colors[colors.length-1]]);

            // Power scale
            // var max = d3.max(all_values),
            //     min = d3.min(all_values);
            // var color_scale = d3.scalePow()
            //                     .domain([min, max])
            //                     .range([colors[0], colors[colors.length-1]])
            //                     .exponent(3);

            // Check out the color scale
            console.log( color_scale(21) );

            //----------------------------------------
            // The map, finally!
            svg.selectAll('path')
                .data(counties)
                .enter()
                .append('path')
                .attr('d', path_gen)
                .style('fill', function(d) {
                    fips_code = d['properties']['STATE'] + d['properties']['COUNTY'];

                    // Color only if the data exists for the FIPS code
                    if (data_map.has(fips_code)) {
                        // Get the entire row of poverty data for each FIPS code
                        poverty_data = data_map.get(fips_code);

                        // Get the specific feature
                        data = poverty_data['PCTPOVALL_2014'];

                        return color_scale(data);
                    };
                })
                .style('opacity', 0.8)
                .style('stroke', '#a0a0a0')
                .style('stroke-width', 0.8)
                .style('stroke-opacity', 0.1)
                .on('mouseover', function(d) {
                    // Make the county color darker
                    d3.select(this)
                        .style('opacity', 1);

                    // Unload data
                    fips_code = d['properties']['STATE'] + d['properties']['COUNTY'];
                    if (data_map.has(fips_code)) {
                        poverty_data = data_map.get(fips_code);
                        name = poverty_data['Area_Name'];
                        poverty_rate = poverty_data['PCTPOVALL_2014'];
                    };

                    // Show the tooltip
                    d3.select('.tooltip')
                        .style('visibility','visible')
                        .style('top', d3.event.pageY+10 + 'px')
                        .style('left', d3.event.pageX+10 + 'px')
                        .html('<strong>' + name + '</strong><br />Poverty rate: ' + poverty_rate + '%');
                })
                .on('mouseout', function(d) {
                    // Make the county usual opacity again
                    d3.select(this)
                        .style('opacity', 0.8);

                    // Hide the tooltip
                    d3.select('.tooltip')
                        .style('visibility','hidden');
                });
        });
    </script>
</body>
</html>



<!DOCTYPE html>
<meta charset="utf-8">
<style>
  body { margin: 0; font-family: sans-serif; background: #111; }
  svg { width: 100vw; height: 100vh; }

  .ward {
    stroke: #999;
    stroke-width: 0.2;
  }

  .ward:hover {
    stroke: #E2068A;
    stroke-width: 1;
  }

  .tooltip {
    position: absolute;
    background: white;
    padding: 8px;
    pointer-events: none;
    font-size: 12px;
    border-radius: 4px;
  }
</style>

<svg></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

const svg = d3.select("svg");
const width = window.innerWidth;
const height = window.innerHeight;

// projection
const projection = d3.geoMercator();
const path = d3.geoPath().projection(projection);

// color scale
const color = d3.scaleThreshold()
  .domain([0.1,1,5,25,50,100,500,1000])
  .range(d3.schemeRdPu[9]);

// tooltip
const tooltip = d3.select("body")
  .append("div")
  .attr("class", "tooltip")
  .style("display", "none");

// load data
Promise.all([
  d3.json("./ward.geojson"),
  d3.json("./hs2.geojson"),
  d3.json("./tree.geojson")
]).then(([ward, hs2, tree]) => {

  // fit projection
  projection.fitSize([width, height], ward);

  // wards
  svg.append("g")
    .selectAll("path")
    .data(ward.features)
    .join("path")
    .attr("class", "ward")
    .attr("d", path)
    .attr("fill", d => {
      const val = d.properties["Total Area Injuncted (ha)"];
      return val ? color(val) : "#f7f7f7";
    })
    .on("mouseover", (event, d) => {
      tooltip.style("display", "block")
        .html(`
          <strong>${d.properties["Ward Name"]}</strong><br>
          Area: ${d.properties["Total Area Injuncted (ha)"] || "N/A"}
        `);
    })
    .on("mousemove", event => {
      tooltip
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY + 10) + "px");
    })
    .on("mouseout", () => {
      tooltip.style("display", "none");
    });

  // HS2 overlay
  svg.append("g")
    .selectAll("path")
    .data(hs2.features)
    .join("path")
    .attr("d", path)
    .attr("fill", "#BF40BF")
    .attr("opacity", 0.6);

  // Tree overlay
  svg.append("g")
    .selectAll("path")
    .data(tree.features)
    .join("path")
    .attr("d", path)
    .attr("fill", "#00FF88")
    .attr("opacity", 0.6);

}).catch(err => {
  console.error("Error loading data:", err);
});

</script>
