<!DOCTYPE html>
<meta charset="utf-8">
<style>
  body { margin: 0; font-family: sans-serif; background: #111; }
  svg { width: 100vw; height: 100vh; }
  .ward { stroke: #999; stroke-width: 0.2; }
  .ward:hover { stroke: #E2068A; stroke-width: 1; }
</style>

<svg></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

const svg = d3.select("svg");
const width = window.innerWidth;
const height = window.innerHeight;

// projection
const projection = d3.geoMercator()
    .fitSize([width, height], {type: "FeatureCollection", features: []});

const path = d3.geoPath().projection(projection);

// color scale (replace with your bins)
const color = d3.scaleThreshold()
    .domain([0.1,1,5,25,50,100,500,1000])
    .range(d3.schemeRdPu[9]);

// load data
Promise.all([
  d3.json("ward.geojson"),
  d3.json("hs2.geojson"),
  d3.json("tree.geojson")
]).then(([ward, hs2, tree]) => {

  // fit projection properly
  projection.fitSize([width, height], ward);

  // wards
  svg.append("g")
    .selectAll("path")
    .data(ward.features)
    .join("path")
    .attr("class", "ward")
    .attr("d", path)
    .attr("fill", d => {
      const val = d.properties["Total Area Injuncted (ha)"];
      return val ? color(val) : "#f7f7f7";
    })
const tooltip = d3.select("body")
  .append("div")
  .style("position", "absolute")
  .style("background", "white")
  .style("padding", "8px")
  .style("display", "none");

svg.selectAll(".ward")
  .on("mouseover", (event, d) => {
    tooltip.style("display", "block")
      .html(`
        <strong>${d.properties["Ward Name"]}</strong><br>
        Area: ${d.properties["Total Area Injuncted (ha)"]}
      `);
  })
  .on("mousemove", event => {
    tooltip
      .style("left", event.pageX + 10 + "px")
      .style("top", event.pageY + 10 + "px");
  })
  .on("mouseout", () => {
    tooltip.style("display", "none");
  });
    .text(d => `${d.properties["Ward Name"]}
Total Injuncted: ${d.properties["Total Area Injuncted (ha)"]}`);

  // HS2 overlay
  svg.append("g")
    .selectAll("path")
    .data(hs2.features)
    .join("path")
    .attr("d", path)
    .attr("fill", "#BF40BF")
    .attr("opacity", 0.8);

  // Tree overlay
  svg.append("g")
    .selectAll("path")
    .data(tree.features)
    .join("path")
    .attr("d", path)
    .attr("fill", "#BF40BF")
    .attr("opacity", 0.8);

});

</script>
